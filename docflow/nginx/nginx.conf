worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS. Re-resolve every 5s so new/removed replicas are picked up
    # and so the resolver returns IPs in rotating order (round-robin across replicas).
    resolver 127.0.0.11 valid=5s ipv6=off;

    log_format lb '$remote_addr -> $upstream_addr "$request" '
                  'status=$status rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log lb;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    client_max_body_size 100M;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 5s;
    proxy_request_buffering off;

    server {
        listen 80;
        server_name _;

        # Variable forces DNS re-resolution on each request. Docker's embedded DNS
        # returns all replica IPs in rotated order, giving even distribution across
        # the `backend` service replicas without requiring nginx-plus.
        location / {
            set $backend_upstream "backend:8000";
            proxy_pass http://$backend_upstream;
        }
    }
}
