services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: docflow-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
