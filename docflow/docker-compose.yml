services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_DIR: /app/data
    expose:
      - "8000"
    volumes:
      - ./backend/data:/app/data
    deploy:
      replicas: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: docflow-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: docflow-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - nginx
